name: CI — build & size check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (ESP32-C3) and size check
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v6.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pip upgrades
        run: |
          python -m pip install --upgrade pip setuptools

      - name: Build project
        run: |
          idf.py build

      - name: Run idf_size and capture report
        run: |
          set -euo pipefail
          ELF=$(ls build/*.elf | head -n1) || true
          if [ -z "${ELF:-}" ]; then echo "No ELF found in build/"; exit 1; fi
          MAP="${ELF%.elf}.map"
          echo "ELF=${ELF}"
          echo "MAP=${MAP}"
          idf_size.py "${MAP}" | tee build/size-report.txt
          # extract numeric total size (expects line like 'Total image size: 133900 bytes')
          SIZE=$(grep -oP 'Total image size:\s*\K[0-9]+' build/size-report.txt || echo 0)
          echo "IMAGE_SIZE=${SIZE}" >> $GITHUB_ENV
          echo "Image size reported: ${SIZE} bytes"

      # Size regression check intentionally removed — keep size report for visibility only.
      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: size-report
          path: build/size-report.txt
